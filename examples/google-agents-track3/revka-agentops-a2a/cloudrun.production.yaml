apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: revka-agentops-a2a
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: revka-agentops-a2a@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 40
      timeoutSeconds: 60
      containers:
        - image: us-docker.pkg.dev/PROJECT_ID/revka/revka-agentops-a2a:REPLACE_ME
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: PROJECT_ID
            - name: GOOGLE_CLOUD_LOCATION
              value: us-central1
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "true"
            - name: MODEL_NAME
              value: gemini-2.5-flash
            - name: ENABLE_CLOUD_LOGGING
              value: "true"
            - name: MAX_MESSAGE_CHARS
              value: "12000"
            - name: MAX_TASKS
              value: "200"
            - name: ADK_RESPONSE_TIMEOUT_SECONDS
              value: "45"
            - name: A2A_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: revka-a2a-bearer-token
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
