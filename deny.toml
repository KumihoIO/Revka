# cargo-deny configuration — v2 schema
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# In v2, vulnerability advisories always emit errors (not configurable).
# unmaintained: scope of unmaintained-crate checks (all | workspace | transitive | none)
unmaintained = "all"
# yanked: deny | warn | allow
yanked = "deny"
# Ignore known unmaintained transitive deps we cannot easily replace
ignore = [
    # bincode v2.0.1 via probe-rs — project ceased but 1.3.3 considered complete
    "RUSTSEC-2025-0141",
    { id = "RUSTSEC-2024-0384", reason = "Reported to `rust-nostr/nostr` and it's WIP" },
    { id = "RUSTSEC-2024-0388", reason = "derivative via wasm_evt_listener transitive dep" },
    { id = "RUSTSEC-2025-0057", reason = "fxhash via selectors transitive dep" },
    { id = "RUSTSEC-2025-0119", reason = "number_prefix via indicatif — cosmetic dep" },
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error (build-time) via glib-macros/gtk3-macros 0.18; remove once gtk-rs stack is bumped" },
]

[licenses]
# All licenses are denied unless explicitly allowed
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]
unused-allowed-license = "allow"

[bans]
# Duplicate crate versions are denied so new, accidental version skew fails the
# `cargo deny check bans` gate (run via `check all` in CI) instead of silently
# accumulating and inflating the size-optimized release binary (opt-level=z,
# fat LTO). Each currently-unavoidable duplicate is allowlisted below with the
# transitive source that pins the older version. To resolve one, bump the
# offending dependency until both consumers converge, then drop its skip entry.
# Regenerate the candidate set with `cargo deny check bans` and skip the
# older/non-canonical version of each pair (keep the newest as canonical).
multiple-versions = "deny"
wildcards = "allow"

# ── async-imap stack: pins the pre-2.x async-channel/event-listener line ──
[[bans.skip]]
crate = "async-channel@1.9.0"
reason = "stop-token (via async-imap) pins 1.x; the rest of the tree is on async-channel 2.x"
[[bans.skip]]
crate = "event-listener@2.5.3"
reason = "async-channel 1.9 pins event-listener 2.x; 5.x is used via event-listener-strategy"

# ── rand / crypto RNG chain: 0.8/0.9/0.10 coexist across crypto + phf + tungstenite ──
[[bans.skip]]
crate = "rand@0.8.6"
reason = "phf_generator (via cron) pins rand 0.8; rand 0.10 is the canonical direct dep"
[[bans.skip]]
crate = "rand@0.9.4"
reason = "tungstenite pins rand 0.9; rand 0.10 is the canonical direct dep"
[[bans.skip]]
crate = "rand_core@0.6.4"
reason = "crypto-common / rand 0.8 pin rand_core 0.6; 0.10 is canonical"
[[bans.skip]]
crate = "rand_core@0.9.5"
reason = "rand 0.9 (via tungstenite) pins rand_core 0.9; 0.10 is canonical"
[[bans.skip]]
crate = "getrandom@0.2.17"
reason = "rand_core 0.6 / ring pin getrandom 0.2; 0.4 is canonical"
[[bans.skip]]
crate = "getrandom@0.3.4"
reason = "cc/jobserver pin getrandom 0.3; 0.4 is canonical"
[[bans.skip]]
crate = "chacha20@0.9.1"
reason = "chacha20poly1305 pins chacha20 0.9; rand 0.10 pulls chacha20 0.10"
[[bans.skip]]
crate = "cpufeatures@0.2.17"
reason = "the RustCrypto stack pins cpufeatures 0.2; chacha20 0.10 (via rand 0.10) pulls 0.3"

# ── major-version transitions still mid-migration across the ecosystem ──
[[bans.skip]]
crate = "bitflags@1.3.2"
reason = "portable-pty pins bitflags 1.x; 2.x is the canonical version"
[[bans.skip]]
crate = "thiserror@1.0.69"
reason = "async-imap/filedescriptor/tokio-socks pin thiserror 1.x; 2.x is canonical"
[[bans.skip]]
crate = "thiserror-impl@1.0.69"
reason = "proc-macro for thiserror 1.x (same migration as thiserror above)"
[[bans.skip]]
crate = "nom@7.1.3"
reason = "async-imap/imap-proto pin nom 7.x; lettre pulls nom 8.x"
[[bans.skip]]
crate = "hashbrown@0.15.5"
reason = "rusqlite (via hashlink) pins hashbrown 0.15; indexmap pulls 0.17"
[[bans.skip]]
crate = "redox_syscall@0.5.18"
reason = "parking_lot pins redox_syscall 0.5; libredox pulls 0.7"
[[bans.skip]]
crate = "r-efi@5.3.0"
reason = "getrandom 0.3 pins r-efi 5.x; getrandom 0.4 pulls 6.x"
[[bans.skip]]
crate = "wit-bindgen@0.51.0"
reason = "wasip3 (via getrandom 0.4) pins wit-bindgen 0.51; wasip2 pulls 0.57"
[[bans.skip]]
crate = "winnow@0.7.15"
reason = "cron pins winnow 0.7; toml 1.x pulls winnow 1.0"
[[bans.skip]]
crate = "webpki-roots@0.26.11"
reason = "tokio-tungstenite pins webpki-roots 0.26; reqwest/lettre pull 1.0"

# ── windows shim family: transitive deps lag the windows-rs version bumps ──
[[bans.skip]]
crate = "windows-link@0.1.3"
reason = "windows-core 0.61 pins windows-link 0.1; chrono/aardvark pull 0.2"
[[bans.skip]]
crate = "windows-sys@0.52.0"
reason = "ring pins windows-sys 0.52; clap/tokio/rustix pull 0.61"

# ── phf: cron and chrono-tz pin different phf minor lines ──
[[bans.skip]]
crate = "phf@0.11.3"
reason = "cron pins phf 0.11; chrono-tz pulls phf 0.12"
[[bans.skip]]
crate = "phf_shared@0.11.3"
reason = "phf 0.11 (via cron) pins phf_shared 0.11; chrono-tz pulls 0.12"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
