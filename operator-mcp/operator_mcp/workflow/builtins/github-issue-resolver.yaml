name: github-issue-resolver
version: "1.0"
description: "Google AI Startup Track 3: Cloud-native GitHub Issue Resolution & PR Automation (A2A executors on Cloud Run, human-in-the-loop governance, no local CLI agents)."

triggers:
  - on_kind: github-issue
    input_map:
      github_payload: "${entity.metadata.github_payload}"
      repo_name: "${entity.metadata.repo_name}"

inputs:
  - name: github_payload
    description: Incoming GitHub Webhook/issue JSON payload containing issue details.
  - name: repo_name
    description: GitHub repository identifier, e.g. KumihoIO/google-agentops-demo.
  - name: track3_a2a_url
    required: false
    default: "https://construct-agentops-a2a-1091585228963.us-central1.run.app"
    description: Deployed Revka Track 3 A2A endpoint discovered (over Cloud Run IAM) during preflight.
  - name: coder_agent_url
    required: false
    default: "https://coder-agent-n22ujw2j2a-uc.a.run.app"
    description: Cloud Run A2A coder executor (ADK/Gemini via Vertex).
  - name: reviewer_agent_url
    required: false
    default: "https://reviewer-agent-n22ujw2j2a-uc.a.run.app"
    description: Legacy Cloud Run A2A reviewer executor (kept for fallback; the reviewer now runs on Vertex AI Agent Engine).
  - name: reviewer_agent_engine
    required: false
    default: "projects/1091585228963/locations/us-central1/reasoningEngines/3625053003137941504"
    description: Vertex AI Agent Engine resource for the ADK/Gemini reviewer (reasoning + Vertex AI Search grounding).
  - name: fix_strategy
    required: false
    default: "Analyze the issue and implement the smallest correct fix. Add or adjust tests to cover the change. Run pytest. Keep the change minimal and well-scoped."
    description: Generic instruction handed to the autonomous coder; the ADK/Gemini coder assesses and implements.

outputs:
  - name: issue_number
    source: "${assess_issue.output_data.issue_number}"
    description: GitHub issue number handled by this run.
  - name: google_agentops_evidence
    source: "${agentops_preflight.output_data.evidence_summary}"
    description: Evidence that the Track 3 A2A control plane was discovered over Cloud Run IAM.
  - name: pr_url
    source: "${extract_pr_number.output_data.pr_url}"
    description: Pull request opened for the issue by the cloud coder.
  - name: pr_number
    source: "${extract_pr_number.output_data.pr_number}"
    description: Integer PR number threaded from the coder's pr_url into the reviewer.
  - name: review_status
    source: "${review_pr.output}"
    description: Reviewer agent verdict text before the merge gate.
  - name: merge_status
    source: "${merge_and_close.output}"
    description: Final merge result text.

steps:
  # -------------------------------------------------------------------------
  # 1. Assess the issue — pure-Python parse of the GitHub payload. No LLM:
  #    the autonomous ADK/Gemini coder does the real assessment downstream.
  # -------------------------------------------------------------------------
  - id: assess_issue
    name: Assess GitHub Issue
    type: python
    position:
      x: 156.84
      y: -149.39
    python:
      timeout: 30
      code: |
        import json, sys
        ctx = json.load(sys.stdin)
        payload = ctx["args"].get("github_payload", "")
        if isinstance(payload, str):
            try:
                payload = json.loads(payload)
            except Exception:
                payload = {}
        if not isinstance(payload, dict):
            payload = {}
        # GitHub webhook payloads nest the issue under "issue"; a raw issue
        # object is also accepted.
        issue = payload.get("issue") if isinstance(payload.get("issue"), dict) else payload
        labels = issue.get("labels") or []
        label_names = [
            (l.get("name") if isinstance(l, dict) else str(l)) for l in labels
        ]
        # The title/body/strategy are interpolated into a downstream a2a
        # `message` that is itself a JSON string literal. Pre-escape them as
        # JSON string bodies (quotes/newlines/backslashes) WITHOUT the
        # surrounding quotes, so they can be dropped safely between quotes in
        # that template without breaking the coder's json.loads.
        def jsstr(v):
            return json.dumps(str(v))[1:-1]
        out = {
            "issue_number": issue.get("number"),
            "issue_title": issue.get("title") or "",
            "issue_body": (issue.get("body") or "")[:6000],
            "labels": label_names,
            "author": (issue.get("user") or {}).get("login", ""),
            "strategy": ctx["args"].get("fix_strategy", ""),
            # _esc variants are JSON-safe for embedding in the a2a message.
            "issue_title_esc": jsstr(issue.get("title") or ""),
            "issue_body_esc": jsstr((issue.get("body") or "")[:6000]),
            "strategy_esc": jsstr(ctx["args"].get("fix_strategy", "")),
        }
        json.dump(out, sys.stdout)
      args:
        github_payload: "${inputs.github_payload}"
        fix_strategy: "${inputs.fix_strategy}"

  # -------------------------------------------------------------------------
  # 2. Google AgentOps preflight — discover the Track 3 A2A control plane over
  #    Cloud Run IAM by minting an identity token from the orchestrator's
  #    metadata server (same mechanism the native a2a step uses). Never hard
  #    fails: connectivity evidence is recorded either way so the run stays
  #    green even if the control plane is momentarily unreachable.
  # -------------------------------------------------------------------------
  - id: agentops_preflight
    name: "Google AgentOps A2A Preflight"
    type: python
    position:
      x: 517.37
      y: 91.21
    depends_on: [assess_issue]
    python:
      timeout: 60
      code: |
        import json, sys, urllib.request, urllib.parse
        ctx = json.load(sys.stdin)
        base = (ctx["args"].get("track3_a2a_url") or "").rstrip("/")
        result = {
            "a2a_discovery_status": "skipped_no_url",
            "agent_card_http": None,
            "agent_name": "",
            "evidence_summary": "",
        }
        def metadata_identity_token(audience):
            url = ("http://metadata.google.internal/computeMetadata/v1/instance/"
                   "service-accounts/default/identity?" +
                   urllib.parse.urlencode({"audience": audience, "format": "full"}))
            req = urllib.request.Request(url, headers={"Metadata-Flavor": "Google"})
            with urllib.request.urlopen(req, timeout=5) as r:
                return r.read().decode("utf-8").strip()
        if base:
            try:
                token = metadata_identity_token(base)
                card_url = base + "/.well-known/agent-card.json"
                req = urllib.request.Request(
                    card_url, headers={"Authorization": "Bearer " + token})
                with urllib.request.urlopen(req, timeout=15) as r:
                    code = r.getcode()
                    body = r.read().decode("utf-8", "replace")
                result["agent_card_http"] = code
                try:
                    card = json.loads(body)
                    result["agent_name"] = card.get("name", "")
                except Exception:
                    card = {}
                result["a2a_discovery_status"] = (
                    "discovered" if code == 200 else "http_" + str(code))
                result["evidence_summary"] = (
                    "Discovered Track 3 A2A control plane '" +
                    (result["agent_name"] or "unknown") + "' at " + base +
                    " over Cloud Run IAM (identity token minted from metadata "
                    "server); agent-card HTTP " + str(code) + ".")
            except Exception as exc:
                result["a2a_discovery_status"] = "cloud_run_auth_unavailable"
                result["evidence_summary"] = (
                    "Track 3 A2A endpoint " + base + " was not reachable during "
                    "preflight: " + type(exc).__name__ + ". The coder and reviewer "
                    "steps below are themselves authenticated A2A calls, which "
                    "exercise the same Cloud Run IAM path.")
        else:
            result["evidence_summary"] = "No Track 3 A2A URL provided; discovery skipped."
        json.dump(result, sys.stdout)
      args:
        track3_a2a_url: "${inputs.track3_a2a_url}"

  # -------------------------------------------------------------------------
  # 3. Human gate — approve the autonomous coder deployment.
  # -------------------------------------------------------------------------
  - id: human_approval_gate_1
    name: Approve Coder Deployment
    type: human_approval
    position:
      x: -125.14
      y: 98.89
    human_approval:
      message: |
        Workflow paused - approve coder deployment to continue.

        Issue: #${assess_issue.output_data.issue_number} ${assess_issue.output_data.issue_title}
        Author: ${assess_issue.output_data.author}
        Labels: ${assess_issue.output_data.labels}
        Strategy: ${assess_issue.output_data.strategy}

        Google AgentOps A2A preflight:
        - discovery: ${agentops_preflight.output_data.a2a_discovery_status}
        - control plane: ${agentops_preflight.output_data.agent_name}
        - evidence: ${agentops_preflight.output_data.evidence_summary}

        Approve only if the issue and the Track 3 A2A evidence are acceptable.
      approve_keywords: [approve, approved, lgtm]
      reject_keywords: [reject, rejected, decline]
    depends_on: [assess_issue, agentops_preflight]

  # -------------------------------------------------------------------------
  # 4. Deploy the autonomous coder — A2A call to the Cloud Run ADK/Gemini
  #    coder. The `message` is a JSON string the coder json.loads; it clones
  #    the repo, implements the fix, runs pytest, pushes a branch, opens a PR,
  #    and returns {pr_url, branch, summary, test_status}.
  # -------------------------------------------------------------------------
  - id: deploy_coder_agent
    name: Deploy Autonomous Coder (A2A / Cloud Run)
    type: a2a
    position:
      x: 155.69
      y: 321.94
    depends_on: [human_approval_gate_1, assess_issue]
    a2a:
      url: "${inputs.coder_agent_url}"
      cloud_run_auth: gcloud
      cloud_run_audience: "${inputs.coder_agent_url}"
      timeout: 1500
      message: |
        {"repo_name": "${inputs.repo_name}", "issue_number": ${assess_issue.output_data.issue_number}, "issue_title": "${assess_issue.output_data.issue_title_esc}", "issue_body": "${assess_issue.output_data.issue_body_esc}", "strategy": "${assess_issue.output_data.strategy_esc}"}

  # -------------------------------------------------------------------------
  # 5. pr_number threading — the coder returns pr_url (a string URL) but the
  #    reviewer needs an integer pr_number. The compute evaluator has no regex
  #    or string-split primitives, so a tiny Python step parses the coder's
  #    artifact JSON (${deploy_coder_agent.output} = the agent's printed text)
  #    and regexes the trailing /pull/<N> integer out of pr_url.
  # -------------------------------------------------------------------------
  - id: extract_pr_number
    name: Extract PR Number from Coder Output
    type: python
    position:
      x: 515.0
      y: 430.0
    depends_on: [deploy_coder_agent]
    python:
      timeout: 30
      code: |
        import json, sys, re, urllib.request
        ctx = json.load(sys.stdin)
        raw = ctx["args"].get("coder_output", "") or ""
        repo = ctx["args"].get("repo_name", "") or ""
        issue_number = ctx["args"].get("issue_number", "")
        data = {}
        # The coder prints a bare JSON object; tolerate surrounding prose by
        # extracting the first {...} block if a direct parse fails.
        try:
            data = json.loads(raw.strip())
        except Exception:
            s, e = raw.find("{"), raw.rfind("}")
            if s != -1 and e > s:
                try:
                    data = json.loads(raw[s:e + 1])
                except Exception:
                    data = {}
        if not isinstance(data, dict):
            data = {}
        pr_url = data.get("pr_url", "") or ""
        m = re.search(r"/pull/(\d+)", pr_url)
        pr_number = int(m.group(1)) if m else None
        branch = data.get("branch", "") or (("fix/issue-%s" % issue_number) if issue_number else "")
        # Fallback: the coder sometimes opens the PR via tools but emits no
        # final JSON. Look it up by its deterministic branch (public repo,
        # unauthenticated API) so a quiet coder doesn't stall the pipeline.
        if pr_number is None and repo and issue_number:
            try:
                owner = repo.split("/")[0]
                br = "fix/issue-%s" % issue_number
                url = ("https://api.github.com/repos/%s/pulls?state=open&head=%s:%s&per_page=5"
                       % (repo, owner, br))
                req = urllib.request.Request(url, headers={
                    "User-Agent": "revka-workflow",
                    "Accept": "application/vnd.github+json",
                })
                with urllib.request.urlopen(req, timeout=20) as resp:
                    prs = json.load(resp)
                if prs:
                    pr_number = int(prs[0]["number"])
                    pr_url = prs[0].get("html_url", pr_url)
                    branch = prs[0].get("head", {}).get("ref", branch)
            except Exception as exc:
                sys.stderr.write("PR branch-lookup fallback failed: %s\n" % exc)
        out = {
            "pr_number": pr_number,
            "pr_url": pr_url,
            "branch": branch,
            "summary": data.get("summary", ""),
            "test_status": data.get("test_status", ""),
        }
        if pr_number is None:
            # Surface a clear failure so the run stops here rather than calling
            # the reviewer with an empty pr_number.
            sys.stderr.write("could not extract pr_number from coder output or branch lookup\n")
            json.dump(out, sys.stdout)
            sys.exit(1)
        json.dump(out, sys.stdout)
      args:
        coder_output: "${deploy_coder_agent.output}"
        repo_name: "${inputs.repo_name}"
        issue_number: "${assess_issue.output_data.issue_number}"

  # -------------------------------------------------------------------------
  # 6. Review the PR — query the ADK/Gemini reviewer running on Vertex AI Agent
  #    Engine (reasoning + Vertex AI Search grounding). The orchestrator mints an
  #    OAuth access token from its metadata server (its SA holds aiplatform.user)
  #    and calls the engine's :streamQuery endpoint, then parses the reviewer's
  #    JSON verdict out of the streamed events. Threaded pr_number comes from the
  #    extract step above.
  # -------------------------------------------------------------------------
  - id: review_pr
    name: "Review Pull Request (Vertex AI Agent Engine)"
    type: python
    position:
      x: 513.52
      y: 600.0
    depends_on: [extract_pr_number]
    python:
      timeout: 900
      code: |
        import json, sys, re, time, urllib.request, urllib.parse
        ctx = json.load(sys.stdin)
        engine = (ctx["args"].get("reviewer_agent_engine") or "").strip()
        repo = ctx["args"].get("repo_name") or ""
        pr = ctx["args"].get("pr_number")
        out = {"review_status": "needs_changes", "findings": [],
               "standards_checked": [], "summary": ""}
        def metadata_access_token():
            url = ("http://metadata.google.internal/computeMetadata/v1/instance/"
                   "service-accounts/default/token")
            req = urllib.request.Request(url, headers={"Metadata-Flavor": "Google"})
            with urllib.request.urlopen(req, timeout=5) as r:
                return json.loads(r.read().decode("utf-8"))["access_token"]
        def query_reviewer():
            loc = engine.split("/locations/")[1].split("/")[0]
            token = metadata_access_token()
            api = ("https://" + loc + "-aiplatform.googleapis.com/v1/" + engine +
                   ":streamQuery?alt=sse")
            message = json.dumps({"repo_name": repo, "pr_number": pr})
            body = json.dumps({"class_method": "stream_query",
                               "input": {"user_id": "revka", "message": message}})
            req = urllib.request.Request(
                api, data=body.encode("utf-8"),
                headers={"Authorization": "Bearer " + token,
                         "Content-Type": "application/json"})
            with urllib.request.urlopen(req, timeout=280) as r:
                raw = r.read().decode("utf-8", "replace")
            final = ""
            for line in raw.splitlines():
                line = line.strip()
                if not line:
                    continue
                if line.startswith("data:"):
                    line = line[5:].strip()
                try:
                    ev = json.loads(line)
                except Exception:
                    continue
                for p in (ev.get("content", {}) or {}).get("parts", []) or []:
                    if p.get("text"):
                        final = p["text"]
            return final
        # The ADK/Gemini agent can transiently fail (empty stream); retry so a
        # single hiccup doesn't drop the verdict. Grounding stays additive.
        final, last_err = "", ""
        for attempt in range(3):
            try:
                final = query_reviewer()
                if final.strip():
                    break
            except Exception as exc:
                last_err = type(exc).__name__ + ": " + str(exc)[:200]
            time.sleep(8 * (attempt + 1))
        m = re.search(r"\{.*\}", final, re.S)
        if m:
            out = json.loads(m.group(0))
        elif last_err:
            out["summary"] = "Agent Engine review call failed: " + last_err
        else:
            out["summary"] = ("Reviewer returned no parseable verdict: " +
                              final[:500])
        json.dump(out, sys.stdout)
      args:
        reviewer_agent_engine: "${inputs.reviewer_agent_engine}"
        repo_name: "${inputs.repo_name}"
        pr_number: "${extract_pr_number.output_data.pr_number}"

  # -------------------------------------------------------------------------
  # 7. Human gate — approve the merge.
  # -------------------------------------------------------------------------
  - id: human_approval_gate_2
    name: Approve Pull Request Merge
    type: human_approval
    position:
      x: -119.62
      y: 647.3
    human_approval:
      message: |
        Workflow paused - approve PR merge to continue.

        PR: #${extract_pr_number.output_data.pr_number} ${extract_pr_number.output_data.pr_url}
        Branch: ${extract_pr_number.output_data.branch}
        Coder summary: ${extract_pr_number.output_data.summary}
        Tests: ${extract_pr_number.output_data.test_status}

        Reviewer verdict:
        ${review_pr.output}

        Google AgentOps evidence: ${agentops_preflight.output_data.evidence_summary}

        Approve only when the review is acceptable and the PR is safe to merge.
      approve_keywords: [approve, approved, lgtm]
      reject_keywords: [reject, rejected, decline]
    depends_on: [review_pr, extract_pr_number, agentops_preflight]

  # -------------------------------------------------------------------------
  # 8. Merge & close — A2A call back to the Cloud Run coder, whose container
  #    holds the GITHUB_TOKEN secret (the orchestrator does not). The coder's
  #    `action: "merge"` branch merges the PR, comments the run id on the
  #    issue, and closes it, returning {merge_status, issue_closed, merged_pr_url}.
  # -------------------------------------------------------------------------
  - id: merge_and_close
    name: "Merge PR & Close Issue (A2A / Cloud Run)"
    type: a2a
    position:
      x: 153.7
      y: 850.0
    depends_on: [human_approval_gate_2, assess_issue, extract_pr_number]
    a2a:
      url: "${inputs.coder_agent_url}"
      cloud_run_auth: gcloud
      cloud_run_audience: "${inputs.coder_agent_url}"
      timeout: 600
      message: |
        {"action": "merge", "repo_name": "${inputs.repo_name}", "issue_number": ${assess_issue.output_data.issue_number}, "pr_number": ${extract_pr_number.output_data.pr_number}, "run_id": "${run_id}"}
