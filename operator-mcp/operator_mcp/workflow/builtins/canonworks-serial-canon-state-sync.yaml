- id: emit-timeline-progress-snapshot
  name: emit_timeline_progress_snapshot
  type: output
  position:
    x: 720
    y: 80
  description: current timeline-progress snapshot을 저장한다. major timeline change는 승인 전 notes에만 둔다.
  retry: 2
  output:
    format: markdown
    template: |
      # Timeline-Progress Snapshot: ${sync-info.output_data.timeline_progress_snapshot_name}

      Source episode: ${sync-info.output_data.source_episode_name}
      Source patch: ${sync-info.output_data.patch_name}
      Apply mode: ${inputs.apply_mode}

      ## Temporal Continuity Contract

      This snapshot must expose the current story clock and scene anchor for the next episode factory:
      - current_story_time
      - previous_episode_end_time
      - previous_scene_location
      - previous_scene_cast
      - active_event
      - episode_start_time
      - episode_start_location
      - episode_start_cast
      - episode_end_time
      - episode_end_location
      - episode_end_cast
      - elapsed_time
      - next_episode_start_anchor
      - next_episode_start_location
      - next_episode_start_cast
      - time_shift_policy
      - time_jump_allowed
      - required_temporal_marker

      Major timeline changes require human approval unless apply_mode is apply_approved and the review accepted them.
      Continuity markers such as no_time_jump/continued_from_previous are safe current facts.
      Same-scene unmarked jumps are not safe current facts and must be pending/rejected.

      ## Snapshot Payload

      ${current-snapshot-builder.output}
    entity_name: ${sync-info.output_data.timeline_progress_snapshot_name}
    entity_kind: timeline-progress
    entity_tag: current
    entity_space: ${project-config.output_data.progress_space}
    metadata_target: revision
    entity_metadata:
      series: ${project-config.output_data.title}
      workflow: canonworks-serial-canon-state-sync
      workflow_version: '1.0'
      snapshot_type: timeline-progress
      source_episode: ${sync-info.output_data.source_episode_name}
      source_episode_kref: ${sync-info.output_data.source_episode_kref}
      source_patch: ${sync-info.output_data.patch_name}
      source_patch_kref: ${canon_patch_candidate.output_data.kref}
      episode_number: ${sync-info.output_data.episode_number}
      volume: ${sync-info.output_data.volume}
      apply_mode: ${inputs.apply_mode}
      review_verdict: ${state-delta-review.output_data.verdict}
      requires_human_approval: ${state-delta-review.output_data.requires_major_timeline_approval}
      story_slug: ${project-config.output_data.story_slug}
      project_id: ${project-config.output_data.project_id}
      language: ${project-config.output_data.language}
      bootstrap_mode: ${inputs.bootstrap_mode}
      target_episode_kref: ${sync-info.output_data.source_episode_kref}
      target_patch_kref: ${sync-info.output_data.target_patch_kref}
  depends_on:
  - emit-relationship-state-snapshot
  - current-snapshot-builder
  - latest-production-episode
  - canon-patch-candidate
  - state-delta-review
  - sync-info
- id: emit-storyline-progress-snapshot
  name: emit_storyline_progress_snapshot
  type: output
  position:
    x: 1080
    y: 80
  description: current storyline-progress snapshot을 저장한다.
  retry: 2
  output:
    format: markdown
    template: |
      # Storyline-Progress Snapshot: ${sync-info.output_data.storyline_progress_snapshot_name}

