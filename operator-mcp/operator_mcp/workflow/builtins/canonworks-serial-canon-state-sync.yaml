- id: update-state-sync-bundles
  name: update_state_sync_bundles
  type: kumiho_bundle_update
  position:
    x: 720
    y: 760
  description: current snapshots와 sync report를 다음 episode factory가 읽는 Kumiho bundles에 등록한다.
  retry: 1
  kumiho:
    project: ${project-config.output_data.project_id}
    mode: add_members
    create_if_missing: true
    idempotent: true
    allow_protected: true
    updates:
    - bundle: ${project-config.output_data.current_character_states_bundle}
      add:
      - item_kref: ${emit-character-state-snapshot.output_data.entity_kref}
        reason: Current character-state snapshot synced after Ep.${sync-info.output_data.episode_number}
        metadata:
          workflow: canonworks-serial-canon-state-sync
          workflow_version: '1.0'
          snapshot_type: character-state
          episode_number: ${sync-info.output_data.episode_number}
          source_episode: ${sync-info.output_data.source_episode_name}
          source_patch: ${sync-info.output_data.patch_name}
    - bundle: ${project-config.output_data.current_relationship_states_bundle}
      add:
      - item_kref: ${emit-relationship-state-snapshot.output_data.entity_kref}
        reason: Current relationship-state snapshot synced after Ep.${sync-info.output_data.episode_number}; risky changes
          require approval unless apply_mode=apply_approved
        metadata:
          workflow: canonworks-serial-canon-state-sync
          workflow_version: '1.0'
          snapshot_type: relationship-state
          episode_number: ${sync-info.output_data.episode_number}
          source_episode: ${sync-info.output_data.source_episode_name}
          source_patch: ${sync-info.output_data.patch_name}
          apply_mode: ${inputs.apply_mode}
          requires_human_approval: ${state-delta-review.output_data.requires_relationship_approval}
    - bundle: ${project-config.output_data.current_timeline_progress_bundle}
      add:
      - item_kref: ${emit-timeline-progress-snapshot.output_data.entity_kref}
        reason: Current timeline-progress snapshot synced after Ep.${sync-info.output_data.episode_number}; major changes
          require approval unless apply_mode=apply_approved
        metadata:
          workflow: canonworks-serial-canon-state-sync
          workflow_version: '1.0'
          snapshot_type: timeline-progress
          episode_number: ${sync-info.output_data.episode_number}
          source_episode: ${sync-info.output_data.source_episode_name}
          source_patch: ${sync-info.output_data.patch_name}
          apply_mode: ${inputs.apply_mode}
          requires_human_approval: ${state-delta-review.output_data.requires_major_timeline_approval}
    - bundle: ${project-config.output_data.current_storyline_progress_bundle}
      add:
      - item_kref: ${emit-storyline-progress-snapshot.output_data.entity_kref}
        reason: Current storyline-progress snapshot synced after Ep.${sync-info.output_data.episode_number}
        metadata:
          workflow: canonworks-serial-canon-state-sync
          workflow_version: '1.0'
          snapshot_type: storyline-progress
          episode_number: ${sync-info.output_data.episode_number}
          source_episode: ${sync-info.output_data.source_episode_name}
          source_patch: ${sync-info.output_data.patch_name}
    - bundle: ${project-config.output_data.current_foreshadow_progress_bundle}
      add:
      - item_kref: ${emit-foreshadow-progress-snapshot.output_data.entity_kref}
        reason: Current foreshadow-progress snapshot synced after Ep.${sync-info.output_data.episode_number}
        metadata:
          workflow: canonworks-serial-canon-state-sync
          workflow_version: '1.0'
          snapshot_type: foreshadow-progress
          episode_number: ${sync-info.output_data.episode_number}
          source_episode: ${sync-info.output_data.source_episode_name}
          source_patch: ${sync-info.output_data.patch_name}
    - bundle: ${project-config.output_data.state_sync_snapshots_bundle}
      add:
      - item_kref: ${emit-character-state-snapshot.output_data.entity_kref}
        reason: Current character-state snapshot for next episode factory context
        metadata:
          snapshot_type: character-state
          episode_number: ${sync-info.output_data.episode_number}
      - item_kref: ${emit-relationship-state-snapshot.output_data.entity_kref}
        reason: Current relationship-state snapshot for next episode factory context
        metadata:
          snapshot_type: relationship-state
          episode_number: ${sync-info.output_data.episode_number}
          requires_human_approval: ${state-delta-review.output_data.requires_relationship_approval}
      - item_kref: ${emit-timeline-progress-snapshot.output_data.entity_kref}
        reason: Current timeline-progress snapshot for next episode factory context
        metadata:
          snapshot_type: timeline-progress
          episode_number: ${sync-info.output_data.episode_number}
          requires_human_approval: ${state-delta-review.output_data.requires_major_timeline_approval}
      - item_kref: ${emit-storyline-progress-snapshot.output_data.entity_kref}
        reason: Current storyline-progress snapshot for next episode factory context
        metadata:
          snapshot_type: storyline-progress
          episode_number: ${sync-info.output_data.episode_number}
      - item_kref: ${emit-foreshadow-progress-snapshot.output_data.entity_kref}
        reason: Current foreshadow-progress snapshot for next episode factory context
        metadata:
          snapshot_type: foreshadow-progress
          episode_number: ${sync-info.output_data.episode_number}
    - bundle: ${project-config.output_data.canon_state_sync_reports_bundle}
      add:
      - item_kref: ${emit-post-episode-sync-report.output_data.entity_kref}
        reason: Post-episode canon state sync report for Ep.${sync-info.output_data.episode_number}
        metadata:
          workflow: canonworks-serial-canon-state-sync
          workflow_version: '1.0'
          episode_number: ${sync-info.output_data.episode_number}
          source_episode: ${sync-info.output_data.source_episode_name}
          source_patch: ${sync-info.output_data.patch_name}
          apply_mode: ${inputs.apply_mode}
          review_verdict: ${state-delta-review.output_data.verdict}
    fail_if_missing_bundle: true
    fail_if_missing_item: true
  depends_on:
  - emit-character-state-snapshot
  - emit-relationship-state-snapshot
  - emit-timeline-progress-snapshot
  - emit-storyline-progress-snapshot
  - emit-foreshadow-progress-snapshot
  - emit-post-episode-sync-report
