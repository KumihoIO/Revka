version: "3.8"
services:
  revka:
    image: ghcr.io/kumihoio/revka:2026.4.21
    restart: unless-stopped
    environment:
      - API_KEY=${API_KEY}
      - PROVIDER=${PROVIDER:-openrouter}
      - REVKA_ALLOW_PUBLIC_BIND=true
      - REVKA_GATEWAY_PORT=42617
    volumes:
      - revka-data:/revka-data
    expose:
      - 42617
volumes:
  revka-data: {}
